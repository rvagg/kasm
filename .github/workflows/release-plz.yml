name: Release PLZ

# release-plz watches conventional commits on master and opens a release PR
# with a version bump and changelog. When the PR is merged, it creates a git
# tag which triggers the publish workflow.

permissions:
  pull-requests: write
  contents: write

on:
  push:
    branches: master

jobs:
  release-plz:
    name: Release PLZ
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: release-plz/action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
